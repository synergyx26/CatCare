name: Database Backup

on:
  schedule:
    - cron: '0 3 * * 0'   # Weekly — every Sunday at 03:00 UTC
    # Uncomment for monthly instead (1st of each month at 03:00 UTC):
    # - cron: '0 3 1 * *'
  workflow_dispatch:       # Manual trigger from the Actions tab

jobs:
  backup:
    name: pg_dump → artifact
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y --no-install-recommends gnupg curl lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump database
        env:
          PGPASSWORD: ${{ secrets.BACKUP_DB_PASSWORD }}
        run: |
          FILENAME="catcare-$(date -u +%Y-%m-%d).dump"
          /usr/lib/postgresql/17/bin/pg_dump \
            --host="${{ secrets.BACKUP_DB_HOST }}" \
            --port="${{ secrets.BACKUP_DB_PORT }}" \
            --username="${{ secrets.BACKUP_DB_USER }}" \
            --dbname="${{ secrets.BACKUP_DB_NAME }}" \
            --no-owner \
            --no-acl \
            --format=custom \
            --file="$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.FILENAME }}
          retention-days: 90
          if-no-files-found: error
