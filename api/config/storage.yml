test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Supabase Storage (S3-compatible). Set these env vars on Render:
#   SUPABASE_S3_KEY_ID      — Supabase dashboard → Storage → S3 Access → Access Key ID
#   SUPABASE_S3_SECRET      — same place → Secret Access Key
#   SUPABASE_S3_REGION      — your project region (e.g. us-east-1)
#   SUPABASE_S3_BUCKET      — name of the bucket you create in Supabase Storage
#   SUPABASE_S3_ENDPOINT    — https://<project-ref>.supabase.co/storage/v1/s3
supabase:
  service: S3
  access_key_id: <%= ENV["SUPABASE_S3_KEY_ID"] %>
  secret_access_key: <%= ENV["SUPABASE_S3_SECRET"] %>
  region: <%= ENV["SUPABASE_S3_REGION"] %>
  bucket: <%= ENV["SUPABASE_S3_BUCKET"] %>
  endpoint: <%= ENV["SUPABASE_S3_ENDPOINT"] %>
  force_path_style: true
